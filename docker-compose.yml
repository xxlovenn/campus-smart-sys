services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword123456}
      POSTGRES_DB: ${POSTGRES_DB:-campus_smart}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-data:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campus} -d ${POSTGRES_DB:-campus_smart}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-campus}:${POSTGRES_PASSWORD:-mypassword123456}@postgres:5432/${POSTGRES_DB:-campus_smart}?schema=public"
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string_min_32_chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        BACKEND_INTERNAL_ORIGIN: http://backend:3001
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: /api
      BACKEND_INTERNAL_ORIGIN: http://backend:3001
    ports:
      - "3000:3000"

volumes:
  pgdata:
